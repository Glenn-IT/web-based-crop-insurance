<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password — LGU Crop Insurance</title>
    <link rel="stylesheet" href="../../assets/css/style.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-container" style="max-width: 500px">
        <div class="auth-right" style="flex: 1; padding: 50px 45px">
          <div style="text-align: center; margin-bottom: 28px">
            <div style="font-size: 52px; margin-bottom: 12px">🔑</div>
            <h2 style="margin-bottom: 6px">Forgot Password?</h2>
            <p class="auth-subtitle">Enter your email to reset your password</p>
          </div>

          <div id="step1">
            <div class="form-group">
              <label class="form-label">Email Address</label>
              <div class="input-group">
                <span class="input-icon">📧</span>
                <input
                  type="email"
                  id="reset-email"
                  class="form-control"
                  placeholder="your@email.com"
                />
              </div>
            </div>
            <button class="btn-primary-auth" onclick="sendReset()">
              Send Reset Link →
            </button>
          </div>

          <div id="step2" style="display: none; text-align: center">
            <div style="font-size: 48px; margin-bottom: 16px">📬</div>
            <h3 style="margin-bottom: 8px; color: var(--primary)">
              Email Sent!
            </h3>
            <p
              style="
                font-size: 13.5px;
                color: var(--text-muted);
                margin-bottom: 24px;
              "
            >
              We've sent a password reset link to your email address. Please
              check your inbox.
            </p>
            <div
              style="
                background: #f8fafc;
                border-radius: 10px;
                padding: 16px;
                border: 1px solid var(--border-color);
                margin-bottom: 20px;
              "
            >
              <p style="font-size: 12px; color: var(--text-muted)">
                📌 This is a prototype. In a real system, an email would be sent
                with a secure reset link.
              </p>
            </div>
            <button
              class="btn-primary-auth"
              onclick="navigateTo('../../index.html')"
            >
              Back to Login
            </button>
          </div>

          <div style="text-align: center; margin-top: 20px">
            <a class="auth-link" onclick="navigateTo('../../index.html')"
              >← Back to Login</a
            >
          </div>
        </div>
      </div>
    </div>
    <div id="toast-container"></div>
    <script src="../../data/mockData.js"></script>
    <script src="../../assets/js/app.js"></script>
    <script>
      function sendReset() {
        const email = document.getElementById("reset-email").value.trim();
        if (!email) {
          showToast("Error", "Please enter your email.", "error");
          return;
        }
        simulateLoading(() => {
          showToast(
            "Email Sent",
            "Check your inbox for the reset link.",
            "success",
          );
          document.getElementById("step1").style.display = "none";
          document.getElementById("step2").style.display = "block";
        }, 1000);
      }
    </script>
  </body>
</html>
