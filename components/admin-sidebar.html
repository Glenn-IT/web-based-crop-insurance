    <div

    >

    <div

        style="background: linear-gradient(135deg, #e74c3c, #c0392b)"
      >
        AL
      </div>
      <div>
        <div class="user-name-sidebar">Admin LGU</div>
        <div class="user-role-sidebar">Administrator</div>
      </div>

    <button
      onclick="adminLogout()"
      style="
        width: 100%;
        margin-top: 8px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.7);
        border-radius: 8px;
        padding: 8px;
        font-size: 13px;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.2s;
      "
      onmouseover="
        this.style.background = 'rgba(220,53,69,0.2)';
        this.style.color = '#ff6b7a';
      "
      onmouseout="
        this.style.background = 'rgba(255,255,255,0.08)';
        this.style.color = 'rgba(255,255,255,0.7)';
      "
    >
      🚪 Sign Out
    </button>
